<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Student Dashboard — EduEquity</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <header class="p-4 bg-white shadow">
      <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="font-semibold">EduEquity — Student</div>
        <nav class="space-x-4">
          <a href="/" class="text-sm">Home</a>
          <a href="/login" class="text-sm">Logout</a>
        </nav>
      </div>
    </header>
    <main class="max-w-6xl mx-auto p-6">
      <h1 class="text-2xl font-bold mb-4">Your Progress</h1>
      <div id="studentOverview" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div id="completed" class="p-4 bg-white rounded shadow">Completed Quizzes<br><span class="text-3xl font-semibold">—</span></div>
        <div id="avg" class="p-4 bg-white rounded shadow">Average Score<br><span class="text-3xl font-semibold">—</span></div>
      </div>
      <section class="mt-6">
        <h2 class="font-semibold mb-2">Recent & Upcoming</h2>
        <div id="studentDetails" class="space-y-2 p-2 bg-white rounded">Loading…</div>
      </section>

      <script>
        async function loadStudentAnalytics() {
          try {
            const user = JSON.parse(localStorage.getItem('ee_user') || 'null');
            const studentId = user?.id || new URLSearchParams(location.search).get('studentId');
            if (!studentId) { document.getElementById('studentDetails').textContent = 'No student context. Please login.'; return; }
            const resp = await fetch('/api/v1/analytics/student/' + studentId);
            const json = await resp.json();
            if (!json.success) { document.getElementById('studentDetails').textContent = 'Failed to load'; return; }
            const d = json.data;
            document.getElementById('completed').querySelector('span').textContent = d.totalQuizzesCompleted || '—';
            document.getElementById('avg').querySelector('span').textContent = Math.round(d.averageScore) + '%';
            const container = document.getElementById('studentDetails');
            container.innerHTML = '';
            const scores = document.createElement('div');
            scores.innerHTML = '<h4 class="font-semibold">Recent Scores</h4>' + (d.quizScores?.map(q=>`<div class="p-2 border rounded my-1">${q.quizTitle}: ${q.score}/${q.maxScore} — ${q.completedAt}</div>`).join('')||'<div>No recent scores</div>');
            container.appendChild(scores);
            const strengths = document.createElement('div');
            strengths.innerHTML = '<h4 class="font-semibold mt-2">Strengths</h4><div>' + (d.strengths?.join(', ')||'—') + '</div>';
            container.appendChild(strengths);
          } catch (err) { console.error(err); }
        }
        loadStudentAnalytics();
      </script>
    </main>
  </body>
</html>
