<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — EduEquity</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center">
      <div class="w-full max-w-md bg-white p-8 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">Sign in to EduEquity</h2>
        <form id="loginForm">
          <label class="block text-sm">Email</label>
          <input id="email" name="email" type="email" required class="w-full p-2 border rounded mb-3" />
          <label class="block text-sm">Password</label>
          <input id="password" name="password" type="password" required class="w-full p-2 border rounded mb-4" />
          <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded">Sign in</button>
        </form>
        <div id="msg" class="text-sm text-red-600 mt-3" />
        <script>
          document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
              const resp = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
              });
              const data = await resp.json();
              if (!data.success) {
                document.getElementById('msg').textContent = data.message || 'Login failed';
                return;
              }
              // Save user to localStorage (prototype)
              try { localStorage.setItem('ee_user', JSON.stringify(data.user)); } catch (e) {}
              // Redirect based on role (prototype)
              const role = data.user?.role || 'student';
              if (role === 'principal') window.location.href = '/dashboard/principal';
              else if (role === 'teacher') window.location.href = '/dashboard/teacher';
              else window.location.href = '/dashboard/student';
            } catch (err) {
              document.getElementById('msg').textContent = 'Network error';
            }
          });
        </script>
        <p class="text-sm text-gray-600 mt-4">Don't have an account? <a href="/register" class="text-indigo-600">Register</a></p>
      </div>
    </div>
  </body>
</html>
